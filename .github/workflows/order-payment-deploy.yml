name: Build and Deploy Docker Image

on:
  pull_request:
    branches:
      - release
    types:
      - closed

jobs:
  build-and-deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -Dspring.profiles.active=prod

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build & Push Docker Image
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/order-payment-service
          docker build -t $IMAGE:${{ github.sha }} .
          docker tag $IMAGE:${{ github.sha }} $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy on server (Rolling v1)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 8822
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            chmod +x /home/be10/be10-team5/script/order-payment-service-deploy.sh
            /home/be10/be10-team5/script/order-payment-service-deploy.sh v1 ${{ github.sha }}
      
      - name: Deploy on server (Rolling v2)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 8822
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            chmod +x /home/be10/be10-team5/script/order-payment-service-deploy.sh
            /home/be10/be10-team5/script/order-payment-service-deploy.sh v2 ${{ github.sha }}

  notify-success:
    needs: build-and-deploy
    if: ${{ success() }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Success
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "botName": "wannab bot",
                 "text": "✅ 배포 성공!",
                 "attachments": [
                   {
                      "title" : "${{ github.repository }} 배포 성공",
                      "text" : "👤 머지한 사람: ${{ github.actor }}\n브랜치: ${{ github.base_ref }}",
                      "color" : "green"
                   }
                 ]
               }' \
               "${{ secrets.DOORAY_WEBHOOK_URL }}"

  notify-failure:
    needs: build-and-deploy
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Failure
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "botName": "wannab bot",
                 "text": "❌ 배포 실패...",
                 "attachments": [
                   {
                      "title" : "${{ github.repository }} 배포 실패",
                      "text" : "👤 머지한 사람: ${{ github.actor }}\n브랜치: ${{ github.base_ref }}",
                      "color" : "red"
                   }
                 ]
               }' \
               "${{ secrets.DOORAY_WEBHOOK_URL }}"

