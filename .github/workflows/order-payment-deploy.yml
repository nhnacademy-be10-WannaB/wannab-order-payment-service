name: order-payment-service server build and deploy

on:
  pull_request:
    branches:
      - release
    types:
      - closed

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR with Maven
        run: mvn clean package

      - name: Upload JAR via SCP (password login)
        uses: appleboy/scp-action@master
        with:
          host: ${{secrets.SERVER_HOST}}
          username: ${{secrets.SERVER_USER}}
          password: ${{secrets.SERVER_PASSWORD}}
          port: ${{secrets.SERVER_PORT}}
          source: "target/order-payment-service-0.0.1-SNAPSHOT.jar"
          target: "/home/be10/be10-team5/test/"

      - name: Run JAR on server (via SSH + password)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "✅ 서버에서 JAR 실행 시작"
            java -jar /home/be10/be10-team5/test/order-payment-service-0.0.1-SNAPSHOT.jar
            echo "✅ 서버 실행 종료됨"